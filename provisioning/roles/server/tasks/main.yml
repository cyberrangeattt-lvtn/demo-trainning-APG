---
# provisioning/roles/server/tasks/main.yml
#
# Install & set up vsftpd 2.3.4 on the `server` host.
# The source archive is bundled with the role at:
#     provisioning/roles/server/files/vsftpd-2.3.4.tar.gz
# vsftpd 2.3.4 is not in Debian 12 repos, so it is built from that tarball.

- name: Install build dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - gcc
      - make
      - libpam0g-dev
      - libcap-dev
      - libnsl-dev
    state: present
    update_cache: true

- name: Ensure the unprivileged "ftp" account exists
  ansible.builtin.user:
    name: ftp
    system: true
    create_home: false
    home: /srv/ftp
    shell: /usr/sbin/nologin

- name: Create the vsftpd secure chroot directory
  ansible.builtin.file:
    path: /usr/share/empty
    state: directory
    mode: "0755"

- name: Unpack the bundled vsftpd 2.3.4 source
  ansible.builtin.unarchive:
    src: vsftpd-2.3.4.tar.gz          # picked up from the role's files/ dir
    dest: /usr/local/src
    creates: /usr/local/src/vsftpd-2.3.4/Makefile

- name: Check whether vsftpd is already built and installed
  ansible.builtin.stat:
    path: /usr/local/sbin/vsftpd
  register: vsftpd_installed

# The bundled tarball ships pre-built 32-bit object files, and vsf_findlibs.sh
# can't locate the libraries under Debian 12's multiarch paths.
# Instead of patching vsf_findlibs.sh (which may silently fail or exit early),
# we override the Makefile's LIBS variable directly on the make command line.
# -fcommon restores pre-GCC-10 behaviour the 2011 source relies on.
- name: Build vsftpd 2.3.4 from source
  when: not vsftpd_installed.stat.exists
  block:
    - name: Remove stale pre-built (32-bit) object files
      ansible.builtin.command:
        cmd: make clean
        chdir: /usr/local/src/vsftpd-2.3.4

    - name: Compile vsftpd 2.3.4 (with explicit library flags)
      ansible.builtin.shell:
        cmd: >-
          make
          CFLAGS="-O2 -Wall -Wformat-security -D_FORTIFY_SOURCE=2
          -fstack-protector -fPIE -fcommon"
          LIBS="-lpam -lcap -ldl -lcrypt"
        chdir: /usr/local/src/vsftpd-2.3.4

- name: Install the vsftpd binary
  ansible.builtin.copy:
    src: /usr/local/src/vsftpd-2.3.4/vsftpd
    dest: /usr/local/sbin/vsftpd
    remote_src: true
    mode: "0755"
  register: vsftpd_binary

- name: Write the vsftpd configuration
  ansible.builtin.copy:
    dest: /etc/vsftpd.conf
    mode: "0644"
    content: |
      listen=YES
      listen_ipv6=NO
      anonymous_enable=NO
      local_enable=YES
      write_enable=YES
      local_umask=022
      dirmessage_enable=YES
      use_localtime=YES
      xferlog_enable=YES
      connect_from_port_20=YES
      chroot_local_user=NO
      secure_chroot_dir=/usr/share/empty
      pam_service_name=vsftpd
  register: vsftpd_conf

- name: Write the PAM profile for vsftpd
  ansible.builtin.copy:
    dest: /etc/pam.d/vsftpd
    mode: "0644"
    content: |
      #%PAM-1.0
      auth    required pam_listfile.so item=user sense=deny file=/etc/ftpusers onerr=succeed
      auth    required pam_unix.so
      account required pam_unix.so
      session required pam_unix.so
  register: vsftpd_pam

- name: Write the vsftpd systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/vsftpd.service
    mode: "0644"
    content: |
      [Unit]
      Description=vsftpd FTP server (2.3.4)
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/sbin/vsftpd /etc/vsftpd.conf
      ExecReload=/bin/kill -HUP $MAINPID
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  register: vsftpd_unit

- name: Enable and start vsftpd
  ansible.builtin.systemd:
    name: vsftpd
    enabled: true
    state: started
    daemon_reload: true

- name: Restart vsftpd when the binary, config, PAM or unit changed
  ansible.builtin.systemd:
    name: vsftpd
    state: restarted
    daemon_reload: true
  when: >
    vsftpd_binary.changed or vsftpd_conf.changed
    or vsftpd_pam.changed or vsftpd_unit.changed

# - name: Create the system user 
#   ansible.builtin.user:
#     name: jack
#     password: "{{ 'ILoveCTU' | password_hash('sha512', 'kypojuniorhacker') }}"
#     shell: /bin/bash
#     create_home: true
#     update_password: always

- name: Add user and set password
  user:
    name: '{{ username }}'
    password: '{{ password | password_hash(''sha512'') }}'
    shell: '/bin/bash'

- name: Place flag
  copy:
    dest: '/root/flag.txt'
    owner: 'root'
    content: "{{ flag }}\n"
    mode: '0600'
