# Step 1: Enable bash command logging on ALL hosts
- name: Setup bash command logging on all hosts
  hosts: hosts
  become: yes
  tasks:
    - name: Apply sandbox-logging-bash role
      import_role:
        name: sandbox-logging-bash

# Step 2: Enable Metasploit command logging ONLY on attacker host
# (chỉ máy attacker có Metasploit)
- name: Setup Metasploit command logging on attacker
  hosts: attacker
  become: yes
  tasks:
    - name: Apply sandbox-logging-msf role
      import_role:
        name: sandbox-logging-msf

# Step 3: Setup log forwarding on ALL hosts to central syslog server
- name: Setup log forwarding to central syslog server
  hosts: hosts
  become: yes
  vars:
    student_id: 0
    sandbox_name: demo-trainning-local
    central_syslog_ip: 78.128.251.179
  tasks:
    - name: Apply sandbox-logging-forward role
      import_role:
        name: sandbox-logging-forward
      vars:
        slf_destination_port: '{% if hostvars["man"] is defined -%} 514 {%- else -%} 515 {%- endif %}'
        slf_destination: '{% if hostvars["man"] is defined -%} {{ hostvars["man"].ansible_host }} {%- else -%} {{ central_syslog_ip }} {%- endif %}'
        slf_sandbox_id: "{{ global_sandbox_id | default(student_id) | default(0) }}"
        slf_sandbox_name: '{{ global_sandbox_name | default(sandbox_name) }}'
        slf_pool_id: '{{ global_pool_id | default(None) }}'
